<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado Universal - Multi-Cola</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav id="menuSuperior">
        <div class="panel-superior">
            <div id="panelSistema" class="seccion-config">
                <h3>⚙️ Sistema Base</h3>
            </div>
            
            <div id="panelColas" class="seccion-config">
                <h3>👥 Configuración de Colas (Prioridades)</h3>
            </div>

            <div id="panelGeneradores" class="seccion-config">
                <h3>🎲 Tiempos del Sistema</h3>
            </div>
        </div>
        
        <div class="controles-ejecucion">
            <button id="btnReiniciar">🔄 Aplicar y Construir Modelo</button>
            <button id="btnPasoAPaso">⏭️ Siguiente Evento</button>
            <button id="btnSimularTodo">⏩ Simular Todo el Intervalo</button>
        </div>
    </nav>
    
    <main>
        <canvas id="lienzoSimulacion" width="900" height="400"></canvas>
        <div class="contenedor-tabla">
            <table id="tablaResultados">
                <thead id="cabeceraTabla"></thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </main>
    <script type="module" src="js/app.js"></script>
</body>
</html>
